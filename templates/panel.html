<table border="1">

<tr>
<th>Nombre</th>
<th>Tipo</th>
<th>Confirmados</th>
<th>Eliminar</th>
</tr>

{% for d in datos %}

<tr>
<td>{{ d.nombre }}</td>
<td>{{ d.tipo_persona }}</td>
<td>{{ d.confirmado }}</td>

<td>
<a href="/eliminar/{{ d.codigo }}">Eliminar</a>
</td>

</tr>

{% endfor %}

</table>
