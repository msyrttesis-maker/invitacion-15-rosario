<!DOCTYPE html>
<html>

<head>

<title>Panel de Invitados</title>

<style>

body{
font-family: Arial;
background:#111;
color:white;
padding:40px;
}

h1{
margin-bottom:30px;
}

.resumen{
background:#222;
padding:20px;
border-radius:10px;
margin-bottom:30px;
}

.crear{
background:#222;
padding:20px;
border-radius:10px;
margin-bottom:30px;
}

input,select{
padding:8px;
margin:5px;
}

button{
padding:8px 14px;
background:#007bff;
color:white;
border:none;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
border:1px solid #444;
padding:10px;
text-align:center;
}

th{
background:#333;
}

.eliminar{
background:red;
}

</style>

</head>

<body>

<h1>Panel de Invitados</h1>


<div class="resumen">

<h2>Resumen</h2>

<p>Mayores confirmados: <b>{{mayores}}</b></p>
<p>Menores confirmados: <b>{{menores}}</b></p>
<p>Familias confirmadas: <b>{{familias}}</b></p>

</div>



<div class="crear">

<h2>Crear Invitado</h2>

<form action="/crear_invitado" method="post">

<input type="text" name="nombre" placeholder="Nombre" required>

<select name="tipo">
<option value="mayor">Mayor</option>
<option value="menor">Menor</option>
<option value="familia">Familia</option>
</select>

<input type="number" name="max_personas" placeholder="Máx personas" required>

<button type="submit">Crear Invitación</button>

</form>

</div>



<table>

<tr>

<th>ID</th>
<th>Nombre</th>
<th>Tipo</th>
<th>Máximo</th>
<th>Confirmados</th>
<th>Link</th>
<th>Eliminar</th>

</tr>


{% for d in datos %}

<tr>

<td>{{d[0]}}</td>

<td>{{d[1]}}</td>

<td>{{d[2]}}</td>

<td>{{d[3]}}</td>

<td>{{d[4]}}</td>

<td>

<a href="/inv/{{d[5]}}" target="_blank">
Abrir
</a>

<button onclick="copiarLink('{{d[5]}}')">
Copiar Link
</button>

</td>
<td>
<a href="/eliminar/{{d[0]}}">
<button class="eliminar">Eliminar</button>
</a>
</td>

</tr>

{% endfor %}

</table>

<script>

function copiarLink(codigo){

let url = window.location.origin + "/inv/" + codigo;

navigator.clipboard.writeText(url);

alert("Link copiado: " + url);

}

</script>

</body>
